---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: testapp-scaler
  namespace: testapp-keda
spec:
  scaleTargetRef:
    name: testapp
  minReplicaCount: 1
  maxReplicaCount: 5
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
  - type: prometheus
    metadata:
      serverAddress: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
      namespace: testapp-keda
      metricName: ping_request_count
      threshold: "0.5"
      query: |
        sum(rate(ping_request_count{namespace="testapp-keda",job="testapp"}[1m]))
      authModes: "bearer"
    authenticationRef:
      name: keda-trigger-auth-prometheus
